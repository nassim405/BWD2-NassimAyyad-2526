<!DOCTYPE html>
<html lang="nl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nova Architects | Contact</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-950 text-gray-200">

    <header class="bg-gray-900 border-b border-blue-500 sticky top-0 z-50 shadow-lg shadow-blue-500/10">

        <div class="w-full flex justify-between items-center py-6 px-6">

            <h1 class="text-2xl md:text-4xl font-extrabold text-blue-500 tracking-wider">
                Nova Architects
            </h1>

            <nav class="hidden md:flex space-x-10 text-lg font-semibold">
                <a href="index.html" class="hover:text-blue-400 transition">Home</a>
                <a href="wie-zijn-we.html" class="hover:text-blue-400 transition">Wie zijn we</a>
                <a href="aanbod.html" class="hover:text-blue-400 transition">Aanbod</a>
                <a href="realisaties.html" class="hover:text-blue-400 transition">Realisaties</a>
                <a href="contact.html" class="hover:text-blue-400 transition">Contact</a>
                <a href="werken-bij.html" class="hover:text-blue-400 transition">Werken bij</a>
            </nav>

            <button type="button" id="menu-btn" class="md:hidden text-blue-400 focus:outline-none">
                ☰
            </button>

        </div>

        <div id="mobile-menu" class="hidden md:hidden bg-gray-900 border-t border-gray-800 px-6 pb-6">
            <div class="flex flex-col space-y-4 text-lg font-semibold">
                <a href="index.html" class="hover:text-blue-400 transition">Home</a>
                <a href="wie-zijn-we.html" class="hover:text-blue-400 transition">Wie zijn we</a>
                <a href="aanbod.html" class="hover:text-blue-400 transition">Aanbod</a>
                <a href="realisaties.html" class="hover:text-blue-400 transition">Realisaties</a>
                <a href="contact.html" class="hover:text-blue-400 transition">Contact</a>
                <a href="werken-bij.html" class="hover:text-blue-400 transition">Werken bij</a>
            </div>
        </div>

    </header>

    <script>
        const btn = document.getElementById("menu-btn");
        const menu = document.getElementById("mobile-menu");

        btn.addEventListener("click", () => {
            menu.classList.toggle("hidden");
        });
    </script>

    <section class="py-20 px-6">
        <div class="max-w-4xl mx-auto bg-gray-900 p-10 rounded-2xl shadow-lg">

            <h2 class="text-3xl font-bold text-white mb-8 text-center">
                Start jouw <span class="text-blue-500">project</span>
            </h2>

            <form class="grid gap-6">

                <input type="text" placeholder="Voornaam" class="p-3 rounded bg-gray-800">
                <input type="text" placeholder="Naam" class="p-3 rounded bg-gray-800">
                <input type="text" placeholder="Adres" class="p-3 rounded bg-gray-800">

                <!-- BUDGET RANGE -->
                <div>
                    <p class="mb-2 text-blue-400">Budget (€)</p>
                    <div class="flex gap-4">
                        <input type="number" placeholder="Min (€)" class="p-3 rounded bg-gray-800 w-1/2">
                        <input type="number" placeholder="Max (€)" class="p-3 rounded bg-gray-800 w-1/2">
                    </div>
                </div>

                <input type="number" placeholder="Aantal slaapkamers" class="p-3 rounded bg-gray-800">
                <input type="number" placeholder="Aantal badkamers" class="p-3 rounded bg-gray-800">

                <div>
                    <p class="mb-2 text-blue-400">Wensen:</p>
                    <label class="block"><input type="checkbox"> Zwembad</label>
                    <label class="block"><input type="checkbox"> Smart home</label>
                    <label class="block"><input type="checkbox"> Zonnepanelen</label>
                    <label class="block"><input type="checkbox"> 3D-geprint</label>
                </div>

                <label>
                    <input type="checkbox"> Aanmelden voor nieuwsbrief
                </label>

                <label class="block">
                    Startdatum:
                    <input type="date" class="p-3 rounded bg-gray-800 w-full mt-2">
                </label>

                <button type="submit" class="bg-blue-600 hover:bg-blue-700 py-3 rounded-xl font-semibold">
                    Verstuur aanvraag
                </button>

            </form>

        </div>
    </section>

    <footer class="bg-gray-950 border-t border-gray-800 py-6 text-center text-gray-500 text-sm">
        © 2026 Nova Architects
    </footer>

</body>

</html>
